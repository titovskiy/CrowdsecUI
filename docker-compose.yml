services:
  crowdsec-ui:
    build: .
    container_name: crowdsec-ui
    ports:
      - "${WEB_PORT:-8088}:8080"
    environment:
      CROWDSEC_API_URL: ${CROWDSEC_API_URL:-http://crowdsec:8080}
      CROWDSEC_METRICS_URL: ${CROWDSEC_METRICS_URL:-}
      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY}
      CROWDSEC_MACHINE_LOGIN: ${CROWDSEC_MACHINE_LOGIN:-}
      CROWDSEC_MACHINE_PASSWORD: ${CROWDSEC_MACHINE_PASSWORD:-}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-10}
    restart: unless-stopped
